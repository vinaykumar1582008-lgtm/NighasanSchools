<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nighasan Schools</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
text-align:center;
}

.header{
background:#0a7cff;
color:white;
padding:20px;
font-size:30px;
font-weight:bold;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

input{
width:90%;
padding:15px;
margin:10px;
font-size:18px;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:95%;
padding:15px;
background:#0a7cff;
color:white;
font-size:20px;
border:none;
border-radius:10px;
}

button:hover{
background:#0066dd;
}

#msg{
margin-top:15px;
font-size:18px;
}
</style>

</head>

<body>

<div class="header">
Nighasan Schools
</div>

<div class="card">

<h2>Student Login</h2>

<input
id="phone"
type="text"
placeholder="Enter Mobile Number">

<button onclick="login()">
Login
</button>

<p id="msg"></p>

</div>

<script src="script.js"></script>

</body>
</html>
